<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人机3D模型旋转控制</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 20px;
            max-width: 1000px;
            width: 100%;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        label {
            font-weight: bold;
            color: #555;
        }
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        .value-display {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            font-weight: bold;
            color: #667eea;
        }
        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        input[type="file"] {
            display: none;
        }
        .file-input-label {
            display: block;
            padding: 12px;
            background: #667eea;
            color: white;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .file-input-label:hover {
            background: #764ba2;
        }
        .file-name {
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            color: #666;
            margin-top: 10px;
            word-break: break-all;
        }
        .viewer-container {
            width: 100%;
            height: 600px;
            background: #f0f0f0;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            border: 2px solid #ddd;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            font-size: 18px;
            color: #667eea;
        }
        .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            color: #e74c3c;
            font-size: 16px;
            max-width: 90%;
        }
        .stats {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            text-align: left;
        }
        .stat-item {
            margin: 8px 0;
            color: #555;
        }
        .stat-item strong {
            color: #667eea;
        }
        .hint {
            margin-top: 20px;
            padding: 15px;
            background: #e8f4f8;
            border-left: 4px solid #3498db;
            border-radius: 4px;
            color: #2c3e50;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚁 DJI 无人机 3D 模型旋转控制</h1>

        <div class="controls">
            <div class="control-group">
                <label>上传 .glb 模型文件</label>
                <div class="file-input-wrapper">
                    <input type="file" id="glbFile" accept=".glb,.gltf" />
                    <label for="glbFile" class="file-input-label">📁 选择模型文件</label>
                    <div class="file-name" id="fileName" style="display: none;"></div>
                </div>
                <div class="hint">💡 支持 .glb 和 .gltf 格式文件</div>
            </div>

            <div class="control-group">
                <label for="rotationSpeed">自动旋转速度 (RPM)</label>
                <input type="range" id="rotationSpeed" min="0" max="100" value="30" step="1">
                <div class="value-display">
                    <span id="speedValue">30</span>
                    <span>RPM</span>
                </div>
            </div>
        </div>

        <div class="viewer-container" id="viewer">
            <div class="loading" id="loading">📁 请上传 .glb 模型文件来开始</div>
            <div class="error" id="error" style="display: none;"></div>
        </div>

        <div class="stats">
            <div class="stat-item">模型状态: <strong id="modelStatus">未加载</strong></div>
            <div class="stat-item">自动旋转: <strong id="rotationStatus">未启用</strong></div>
            <div class="stat-item">当前旋转速度: <strong id="currentRPM">0</strong> RPM</div>
            <div class="stat-item">总旋转圈数: <strong id="totalRotations">0</strong> 圈</div>
        </div>
    </div>

    <!-- Three.js 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- GLTFLoader -->
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // 场景设置
        let scene, camera, renderer, model;
        const container = document.getElementById('viewer');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const fileInput = document.getElementById('glbFile');
        const rotationSpeedSlider = document.getElementById('rotationSpeed');
        const speedValue = document.getElementById('speedValue');
        const fileName = document.getElementById('fileName');
        const modelStatus = document.getElementById('modelStatus');
        const rotationStatus = document.getElementById('rotationStatus');
        const currentRPMDisplay = document.getElementById('currentRPM');
        const totalRotationsDisplay = document.getElementById('totalRotations');

        let state = {
            rpm: 30,
            rotationAngle: 0,
            totalRotations: 0,
            isAutoRotating: true,
            lastTimestamp: Date.now(),
        };

        // 初始化 Three.js 场景
        function initScene() {
            // 场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f0f0);

            // 相机
            camera = new THREE.PerspectiveCamera(
                75,
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            camera.position.set(0, 0, 2);

            // 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.innerHTML = '';
            container.appendChild(renderer.domElement);

            // 光源
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0xffffff, 0.5);
            pointLight.position.set(-5, 5, 5);
            scene.add(pointLight);

            // 网格
            const gridHelper = new THREE.GridHelper(10, 10, 0xcccccc, 0xeeeeee);
            gridHelper.position.y = -2;
            scene.add(gridHelper);

            // 响应窗口大小
            window.addEventListener('resize', onWindowResize);

            // 启动动画循环
            animate();
        }

        // 加载 GLB 文件
        function loadGLBModel(file) {
            const reader = new FileReader();

            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                const blob = new Blob([arrayBuffer], { type: 'model/gltf-binary' });
                const url = URL.createObjectURL(blob);

                const loader = new THREE.GLTFLoader();

                loadingEl.textContent = '加载中...';
                loadingEl.style.display = 'block';
                errorEl.style.display = 'none';

                loader.load(
                    url,
                    (gltf) => {
                        // 清除旧模型
                        if (model) {
                            scene.remove(model);
                        }

                        model = gltf.scene;

                        // 调整模型大小和位置
                        const box = new THREE.Box3().setFromObject(model);
                        const size = box.getSize(new THREE.Vector3());
                        const maxDim = Math.max(size.x, size.y, size.z);
                        const scale = 1.5 / maxDim;

                        model.scale.multiplyScalar(scale);

                        const center = box.getCenter(new THREE.Vector3());
                        model.position.sub(center);
                        model.position.y += 0.3;

                        scene.add(model);

                        // 调整相机
                        camera.position.z = 3;
                        camera.lookAt(0, 0, 0);

                        // 重置旋转状态
                        state.rotationAngle = 0;
                        state.totalRotations = 0;

                        // 更新状态显示
                        loadingEl.style.display = 'none';
                        modelStatus.textContent = '已加载';
                        rotationStatus.textContent = '启用';
                        state.isAutoRotating = true;

                        URL.revokeObjectURL(url);
                    },
                    (progress) => {
                        loadingEl.textContent = `加载中... ${Math.round((progress.loaded / progress.total) * 100)}%`;
                    },
                    (error) => {
                        loadingEl.style.display = 'none';
                        errorEl.style.display = 'block';
                        errorEl.textContent = '加载失败: ' + error.message;
                        modelStatus.textContent = '加载失败';
                    }
                );
            };

            reader.onerror = function() {
                errorEl.style.display = 'block';
                errorEl.textContent = '文件读取失败';
                loadingEl.style.display = 'none';
                modelStatus.textContent = '加载失败';
            };

            reader.readAsArrayBuffer(file);
        }

        // 文件选择事件
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                fileName.textContent = '📄 ' + file.name;
                fileName.style.display = 'block';
                loadGLBModel(file);
            }
        });

        // 旋转速度变化
        rotationSpeedSlider.addEventListener('input', (e) => {
            state.rpm = parseInt(e.target.value);
            speedValue.textContent = state.rpm;
        });

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);

            if (model && state.isAutoRotating) {
                // 计算旋转
                const now = Date.now();
                const deltaTime = (now - state.lastTimestamp) / 1000;
                state.lastTimestamp = now;

                const degreesPerSecond = (state.rpm / 60) * 360;
                state.rotationAngle += degreesPerSecond * deltaTime;
                state.totalRotations = state.rotationAngle / 360;

                // 应用旋转（Y轴旋转）
                model.rotation.y = THREE.MathUtils.degToRad(state.rotationAngle);

                // 更新显示
                currentRPMDisplay.textContent = state.rpm;
                totalRotationsDisplay.textContent = state.totalRotations.toFixed(2);
            }

            renderer.render(scene, camera);
        }

        // 窗口调整事件
        function onWindowResize() {
            const width = container.clientWidth;
            const height = container.clientHeight;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();

            renderer.setSize(width, height);
        }

        // 启动
        initScene();
    </script>
</body>
</html>
