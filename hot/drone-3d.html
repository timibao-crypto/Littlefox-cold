<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人机3D模型旋转控制</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 20px;
            max-width: 1000px;
            width: 100%;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        label {
            font-weight: bold;
            color: #555;
        }
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        .value-display {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            font-weight: bold;
            color: #667eea;
        }
        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        input[type="file"] {
            display: none;
        }
        .file-input-label {
            display: block;
            padding: 12px;
            background: #667eea;
            color: white;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .file-input-label:hover {
            background: #764ba2;
        }
        .file-name {
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            color: #666;
            margin-top: 10px;
            word-break: break-all;
        }
        .viewer-container {
            width: 100%;
            height: 600px;
            background: #f0f0f0;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            border: 2px solid #ddd;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            font-size: 18px;
            color: #667eea;
        }
        .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            color: #e74c3c;
            font-size: 16px;
            max-width: 90%;
        }
        .stats {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            text-align: left;
        }
        .stat-item {
            margin: 8px 0;
            color: #555;
        }
        .stat-item strong {
            color: #667eea;
        }
        .hint {
            margin-top: 20px;
            padding: 15px;
            background: #e8f4f8;
            border-left: 4px solid #3498db;
            border-radius: 4px;
            color: #2c3e50;
            font-size: 14px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            flex: 1;
            padding: 10px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚁 DJI 无人机 3D 模型旋转控制</h1>

        <div class="controls">
            <div class="control-group">
                <label>上传 .glb 模型文件</label>
                <div class="file-input-wrapper">
                    <input type="file" id="glbFile" accept=".glb,.gltf" />
                    <label for="glbFile" class="file-input-label">📁 选择模型文件</label>
                    <div class="file-name" id="fileName" style="display: none;"></div>
                </div>
                <div class="button-group">
                    <button id="clearBtn" style="background: #e74c3c;">🗑️ 清空已保存模型</button>
                </div>
                <div class="hint">💡 已上传的模型会自动保存，下次启动时自动加载</div>
            </div>

            <div class="control-group">
                <label for="rotationSpeed">自动旋转速度 (RPM)</label>
                <input type="range" id="rotationSpeed" min="0" max="100" value="30" step="1">
                <div class="value-display">
                    <span id="speedValue">30</span>
                    <span>RPM</span>
                </div>
            </div>
        </div>

        <div class="viewer-container" id="viewer">
            <div class="loading" id="loading">📁 请上传 .glb 模型文件来开始 或 等待自动加载...<br><small style="font-size: 12px; color: #999; margin-top: 10px;">(允许加载最多30秒)</small></div>
            <div class="error" id="error" style="display: none;"></div>
        </div>

        <div class="stats">
            <div class="stat-item">模型状态: <strong id="modelStatus">未加载</strong></div>
            <div class="stat-item">自动旋转: <strong id="rotationStatus">未启用</strong></div>
            <div class="stat-item">当前旋转速度: <strong id="currentRPM">0</strong> RPM</div>
            <div class="stat-item">总旋转圈数: <strong id="totalRotations">0</strong> 圈</div>
        </div>
    </div>

    <!-- Three.js 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- GLTFLoader -->
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // 场景设置
        let scene, camera, renderer, model;
        const container = document.getElementById('viewer');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const fileInput = document.getElementById('glbFile');
        const rotationSpeedSlider = document.getElementById('rotationSpeed');
        const speedValue = document.getElementById('speedValue');
        const fileName = document.getElementById('fileName');
        const modelStatus = document.getElementById('modelStatus');
        const rotationStatus = document.getElementById('rotationStatus');
        const currentRPMDisplay = document.getElementById('currentRPM');
        const totalRotationsDisplay = document.getElementById('totalRotations');
        const clearBtn = document.getElementById('clearBtn');

        let state = {
            rpm: 30,
            rotationAngle: 0,
            totalRotations: 0,
            isAutoRotating: true,
            lastTimestamp: Date.now(),
        };

        // IndexedDB 配置
        const DB_NAME = 'DroneModelDB';
        const STORE_NAME = 'models';
        let db;

        // 初始化数据库
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);

                request.onerror = () => {
                    console.error('IndexedDB 初始化失败');
                    reject();
                };

                request.onsuccess = (event) => {
                    db = event.target.result;
                    resolve();
                };

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
            });
        }

        // 保存模型到数据库
        function saveModelToDB(file) {
            return new Promise((resolve, reject) => {
                if (!db) {
                    console.warn('数据库未初始化，跳过保存');
                    resolve();
                    return;
                }

                const reader = new FileReader();

                reader.onload = function(e) {
                    try {
                        const transaction = db.transaction([STORE_NAME], 'readwrite');
                        const store = transaction.objectStore(STORE_NAME);

                        store.clear();
                        const request = store.add({
                            id: 'lastModel',
                            name: file.name,
                            data: e.target.result,
                            timestamp: Date.now()
                        });

                        request.onerror = () => {
                            console.error('保存到IndexedDB失败');
                            reject(request.error);
                        };

                        transaction.oncomplete = () => {
                            console.log('模型已保存到IndexedDB');
                            resolve();
                        };
                        
                        transaction.onerror = () => {
                            console.error('保存事务失败');
                            reject(transaction.error);
                        };
                    } catch (error) {
                        console.error('保存异常:', error);
                        reject(error);
                    }
                };

                reader.onerror = () => {
                    console.error('文件读取失败');
                    reject(reader.error);
                };

                reader.readAsArrayBuffer(file);
            });
        }

        // 从数据库加载模型
        function loadModelFromDB() {
            return new Promise((resolve) => {
                if (!db) {
                    resolve(null);
                    return;
                }

                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get('lastModel');

                request.onsuccess = () => {
                    resolve(request.result);
                };

                request.onerror = () => {
                    resolve(null);
                };
            });
        }

        // 清空数据库
        function clearDatabase() {
            if (!db) {
                console.warn('数据库未初始化');
                return;
            }
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            store.clear();
            
            fileName.style.display = 'none';
            if (model) {
                scene.remove(model);
                model = null;
            }
            loadingEl.textContent = '📁 已清空已保存的模型，请上传新的 .glb 文件';
            loadingEl.style.display = 'block';
            errorEl.style.display = 'none';
            modelStatus.textContent = '未加载';
            console.log('已清空IndexedDB数据');
        }

        // 初始化 Three.js 场景
        function initScene() {
            // 场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f0f0);

            // 相机
            camera = new THREE.PerspectiveCamera(
                75,
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            camera.position.set(0, 0, 2);

            // 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.innerHTML = '';
            container.appendChild(renderer.domElement);

            // 光源
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0xffffff, 0.5);
            pointLight.position.set(-5, 5, 5);
            scene.add(pointLight);

            // 网格
            const gridHelper = new THREE.GridHelper(10, 10, 0xcccccc, 0xeeeeee);
            gridHelper.position.y = -2;
            scene.add(gridHelper);

            // 响应窗口大小
            window.addEventListener('resize', onWindowResize);

            // 启动动画循环
            animate();
        }

        // 从 ArrayBuffer 加载模型
        function loadGLBModelFromBuffer(arrayBuffer, displayName) {
            const blob = new Blob([arrayBuffer], { type: 'model/gltf-binary' });
            const url = URL.createObjectURL(blob);

            const loader = new THREE.GLTFLoader();

            loadingEl.textContent = `加载中... (${(arrayBuffer.byteLength / 1024 / 1024).toFixed(2)} MB)`;
            loadingEl.style.display = 'block';
            errorEl.style.display = 'none';

            let loadTimeout = setTimeout(() => {
                console.warn('加载超时（30秒），可能的原因：网络缓慢或模型过大');
                loadingEl.textContent = '加载中... (仍在处理中，请稍候...)';
            }, 30000);

            loader.load(
                url,
                (gltf) => {
                    clearTimeout(loadTimeout);
                    
                    // 清除旧模型
                    if (model) {
                        scene.remove(model);
                    }

                    model = gltf.scene;

                    // 调整模型大小和位置
                    const box = new THREE.Box3().setFromObject(model);
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 1.5 / maxDim;

                    model.scale.multiplyScalar(scale);

                    const center = box.getCenter(new THREE.Vector3());
                    model.position.sub(center);
                    model.position.y += 0.3;

                    scene.add(model);

                    // 调整相机
                    camera.position.z = 3;
                    camera.lookAt(0, 0, 0);

                    // 重置旋转状态
                    state.rotationAngle = 0;
                    state.totalRotations = 0;

                    // 更新状态显示
                    loadingEl.style.display = 'none';
                    fileName.textContent = '📄 ' + displayName;
                    fileName.style.display = 'block';
                    modelStatus.textContent = '已加载 ✓';
                    rotationStatus.textContent = '启用 ✓';
                    state.isAutoRotating = true;

                    console.log('模型加载成功:', displayName);
                    URL.revokeObjectURL(url);
                },
                (progress) => {
                    const percentComplete = Math.round((progress.loaded / progress.total) * 100);
                    loadingEl.textContent = `加载中... ${percentComplete}% (${(progress.loaded / 1024 / 1024).toFixed(2)} MB / ${(progress.total / 1024 / 1024).toFixed(2)} MB)`;
                },
                (error) => {
                    clearTimeout(loadTimeout);
                    loadingEl.style.display = 'none';
                    errorEl.style.display = 'block';
                    errorEl.textContent = '❌ 加载失败: ' + error.message + '<br><small>请尝试重新上传或检查文件是否损坏</small>';
                    modelStatus.textContent = '加载失败 ✗';
                    console.error('加载错误:', error);
                }
            );
        }

        // 加载 GLB 文件
        function loadGLBModel(file) {
            const reader = new FileReader();

            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                
                console.log('文件已读取:', file.name, '大小:', (arrayBuffer.byteLength / 1024 / 1024).toFixed(2), 'MB');
                
                // 保存到数据库
                saveModelToDB(file).catch(err => console.error('保存到数据库失败:', err));
                
                // 加载模型
                setTimeout(() => {
                    loadGLBModelFromBuffer(arrayBuffer, file.name);
                }, 100);
            };

            reader.onerror = function(error) {
                console.error('文件读取错误:', error);
                errorEl.style.display = 'block';
                errorEl.textContent = '❌ 文件读取失败: ' + error.message;
                loadingEl.style.display = 'none';
                modelStatus.textContent = '加载失败';
            };

            reader.readAsArrayBuffer(file);
        }

        // 文件选择事件
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                loadGLBModel(file);
            }
        });

        // 旋转速度变化
        rotationSpeedSlider.addEventListener('input', (e) => {
            state.rpm = parseInt(e.target.value);
            speedValue.textContent = state.rpm;
        });

        // 清空按钮
        clearBtn.addEventListener('click', clearDatabase);

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);

            if (model && state.isAutoRotating) {
                const now = Date.now();
                const deltaTime = (now - state.lastTimestamp) / 1000;
                state.lastTimestamp = now;

                const degreesPerSecond = (state.rpm / 60) * 360;
                state.rotationAngle += degreesPerSecond * deltaTime;
                state.totalRotations = state.rotationAngle / 360;

                model.rotation.y = THREE.MathUtils.degToRad(state.rotationAngle);

                currentRPMDisplay.textContent = state.rpm;
                totalRotationsDisplay.textContent = state.totalRotations.toFixed(2);
            }

            renderer.render(scene, camera);
        }

        // 窗口调整事件
        function onWindowResize() {
            const width = container.clientWidth;
            const height = container.clientHeight;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();

            renderer.setSize(width, height);
        }

        // 启动应用
        async function startup() {
            try {
                console.log('开始初始化...');
                await initDB();
                console.log('数据库初始化成功');
                
                initScene();
                console.log('Three.js 场景初始化成功');

                // 尝试加载已保存的模型
                console.log('尝试从数据库加载已保存的模型...');
                const savedModel = await loadModelFromDB();
                
                if (savedModel) {
                    console.log('找到已保存的模型:', savedModel.name);
                    loadingEl.textContent = `正在加载: ${savedModel.name}...`;
                    loadGLBModelFromBuffer(savedModel.data, savedModel.name);
                } else {
                    console.log('未找到已保存的模型，等待用户上传');
                    loadingEl.textContent = '📁 请上传 .glb 模型文件来开始';
                }
            } catch (error) {
                console.error('启动失败:', error);
                errorEl.style.display = 'block';
                errorEl.textContent = '❌ 初始化失败: ' + error.message;
                loadingEl.style.display = 'none';
                initScene();
            }
        }

        // 页面加载完成后启动
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', startup);
        } else {
            startup();
        }
    </script>
</body>
</html>
