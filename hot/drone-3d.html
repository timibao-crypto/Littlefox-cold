<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人机 3D 模型查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 20px;
            max-width: 1000px;
            width: 100%;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        label {
            font-weight: bold;
            color: #555;
        }
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        .value-display {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            font-weight: bold;
            color: #667eea;
        }
        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        input[type="file"] {
            display: none;
        }
        .file-input-label {
            display: block;
            padding: 12px;
            background: #667eea;
            color: white;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .file-input-label:hover {
            background: #764ba2;
        }
        .file-name {
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            color: #666;
            margin-top: 10px;
            word-break: break-all;
        }
        .viewer-container {
            width: 100%;
            height: 600px;
            background: #f0f0f0;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            border: 2px solid #ddd;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            font-size: 18px;
            color: #667eea;
        }
        .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            color: #e74c3c;
            font-size: 16px;
            max-width: 90%;
        }
        .stats {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            text-align: left;
        }
        .stat-item {
            margin: 8px 0;
            color: #555;
        }
        .stat-item strong {
            color: #667eea;
        }
        .hint {
            margin-top: 20px;
            padding: 15px;
            background: #e8f4f8;
            border-left: 4px solid #3498db;
            border-radius: 4px;
            color: #2c3e50;
            font-size: 14px;
        }
        .debug-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f8ff;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 12px;
            color: #333;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .debug-title {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            flex: 1;
            padding: 10px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚁 无人机 3D 模型查看器</h1>

        <div class="controls">
            <div class="control-group">
                <label>📁 上传 .glb 模型文件</label>
                <div class="file-input-wrapper">
                    <input type="file" id="glbFile" accept=".glb,.gltf" />
                    <label for="glbFile" class="file-input-label">选择模型文件</label>
                    <div class="file-name" id="fileName"></div>
                </div>
                <div class="button-group">
                    <button class="clear-btn" id="clearBtn">🗑️ 清空</button>
                    <button class="diagnose-btn" id="diagnoseBtn">🔧 诊断</button>
                </div>
                <div class="hint">💡 上传的模型会自动保存，下次打开页面时自动加载</div>
            </div>

            <div class="control-group">
                <label for="rotationSpeed">⚙️ 自动旋转速度 (RPM)</label>
                <input type="range" id="rotationSpeed" min="0" max="100" value="10" step="1">
                <div class="value-display">
                    <span id="speedValue">10</span>
                    <span>RPM</span>
                </div>
            </div>
        </div>

        <div class="viewer-container" id="viewer">
            <div class="loading" id="loading">📁 请上传 .glb 模型文件<br><small>(或等待自动加载...</small></div>
            <div class="error" id="error" style="display: none;"></div>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">模型状态</div>
                <div class="stat-value" id="modelStatus">未加载</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">旋转状态</div>
                <div class="stat-value" id="rotationStatus">停止</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">当前 RPM</div>
                <div class="stat-value" id="currentRPM">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">总旋转圈数</div>
                <div class="stat-value" id="totalRotations">0</div>
            </div>
        </div>

        <div class="debug-info">
            <div class="debug-title">🔍 调试信息</div>
            <div id="debugLog"></div>
        </div>
    </div>

    <!-- Three.js 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- GLTFLoader -->
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // 场景设置
        let scene, camera, renderer, model;
        const container = document.getElementById('viewer');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const fileInput = document.getElementById('glbFile');
        const rotationSpeedSlider = document.getElementById('rotationSpeed');
        const speedValue = document.getElementById('speedValue');
        const fileName = document.getElementById('fileName');
        const modelStatus = document.getElementById('modelStatus');
        const rotationStatus = document.getElementById('rotationStatus');
        const currentRPMDisplay = document.getElementById('currentRPM');
        const totalRotationsDisplay = document.getElementById('totalRotations');
        const clearBtn = document.getElementById('clearBtn');

        let state = {
            rpm: 30,
            rotationAngle: 0,
            totalRotations: 0,
            isAutoRotating: true,
            lastTimestamp: Date.now(),
        };

        // 诊断函数
        function runDiagnostics() {
            addDebugLog('═══ 开始系统诊断 ═══');
            addDebugLog('🖥️ 浏览器: ' + navigator.userAgent.substring(0, 60));
            addDebugLog('📦 WebGL 支持: ' + (window.WebGLRenderingContext ? '✓' : '✗'));
            addDebugLog('📐 容器大小: ' + container.clientWidth + 'x' + container.clientHeight);
            addDebugLog('🎬 Three.js 版本: ' + THREE.REVISION);
            
            if (renderer) {
                try {
                    const info = renderer.info;
                    addDebugLog(`🎨 渲染器状态: 三角形=${info.render.triangles}, 线=${info.render.lines}, 点=${info.render.points}`);
                } catch (e) {}
            }
            
            addDebugLog(`📊 场景对象数: ${scene ? scene.children.length : 0}`);
            
            if (model) {
                addDebugLog('✅ 模型已加载');
                addDebugLog(`📍 模型位置: (${model.position.x.toFixed(2)}, ${model.position.y.toFixed(2)}, ${model.position.z.toFixed(2)})`);
                addDebugLog(`🔄 模型旋转: (${model.rotation.x.toFixed(2)}, ${model.rotation.y.toFixed(2)}, ${model.rotation.z.toFixed(2)})`);
                addDebugLog(`📏 模型缩放: (${model.scale.x.toFixed(4)}, ${model.scale.y.toFixed(4)}, ${model.scale.z.toFixed(4)})`);
            } else {
                addDebugLog('⚠️ 模型未加载');
            }
            
            if (!db) {
                addDebugLog('❌ IndexedDB 未初始化');
                return;
            }
            
            try {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get('lastModel');

                request.onsuccess = () => {
                    if (request.result) {
                        const modelData = request.result;
                        addDebugLog(`✅ 数据库中找到模型: ${modelData.name}`);
                        addDebugLog(`📊 模型大小: ${(modelData.data.byteLength / 1024 / 1024).toFixed(3)} MB`);
                        addDebugLog(`🕐 保存时间: ${new Date(modelData.timestamp).toLocaleString()}`);
                    } else {
                        addDebugLog('⚠️ 数据库为空');
                    }
                };
            } catch (error) {
                addDebugLog('❌ 诊断异常: ' + error.message);
            }
            
            addDebugLog('═══ 诊断完成 ═══');
        }

        // 调试日志系统
        const debugLog = [];
        function addDebugLog(message) {
            const timestamp = new Date().toLocaleTimeString();
            const logMessage = `[${timestamp}] ${message}`;
            debugLog.push(logMessage);
            console.log(logMessage);
            if (debugLog.length > 50) debugLog.shift();
            updateDebugDisplay();
        }

        function updateDebugDisplay() {
            const debugEl = document.getElementById('debugLog');
            debugEl.textContent = debugLog.join('\n');
            debugEl.scrollTop = debugEl.scrollHeight;
        }

        // IndexedDB 配置
        const DB_NAME = 'DroneModelDB';
        const STORE_NAME = 'models';
        let db;

        // 初始化数据库
        function initDB() {
            return new Promise((resolve, reject) => {
                addDebugLog('📦 初始化 IndexedDB...');
                const request = indexedDB.open(DB_NAME, 1);

                request.onerror = () => {
                    addDebugLog('❌ IndexedDB 初始化失败: ' + request.error);
                    reject();
                };

                request.onsuccess = (event) => {
                    db = event.target.result;
                    addDebugLog('✅ IndexedDB 初始化成功');
                    resolve();
                };

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                        addDebugLog('✅ 创建 ObjectStore: ' + STORE_NAME);
                    }
                };
            });
        }

        // 保存模型到数据库
        function saveModelToDB(file) {
            return new Promise((resolve, reject) => {
                if (!db) {
                    console.warn('数据库未初始化，跳过保存');
                    resolve();
                    return;
                }

                const reader = new FileReader();

                reader.onload = function(e) {
                    try {
                        const transaction = db.transaction([STORE_NAME], 'readwrite');
                        const store = transaction.objectStore(STORE_NAME);

                        store.clear();
                        const request = store.add({
                            id: 'lastModel',
                            name: file.name,
                            data: e.target.result,
                            timestamp: Date.now()
                        });

                        request.onerror = () => {
                            console.error('保存到IndexedDB失败');
                            reject(request.error);
                        };

                        transaction.oncomplete = () => {
                            console.log('模型已保存到IndexedDB');
                            resolve();
                        };
                        
                        transaction.onerror = () => {
                            console.error('保存事务失败');
                            reject(transaction.error);
                        };
                    } catch (error) {
                        console.error('保存异常:', error);
                        reject(error);
                    }
                };

                reader.onerror = () => {
                    console.error('文件读取失败');
                    reject(reader.error);
                };

                reader.readAsArrayBuffer(file);
            });
        }

        // 从数据库加载模型
        function loadModelFromDB() {
            return new Promise((resolve) => {
                if (!db) {
                    addDebugLog('⚠️ 数据库未初始化，跳过加载');
                    resolve(null);
                    return;
                }

                try {
                    const transaction = db.transaction([STORE_NAME], 'readonly');
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.get('lastModel');

                    request.onsuccess = () => {
                        if (request.result) {
                            addDebugLog(`✅ 从数据库加载模型: ${request.result.name}`);
                            resolve(request.result);
                        } else {
                            addDebugLog('⚠️ 数据库中没有保存的模型');
                            resolve(null);
                        }
                    };

                    request.onerror = () => {
                        addDebugLog('❌ 数据库读取失败: ' + request.error);
                        resolve(null);
                    };
                } catch (error) {
                    addDebugLog('❌ 数据库操作异常: ' + error.message);
                    resolve(null);
                }
            });
        }

        // 清空数据库
        function clearDatabase() {
            if (!db) {
                addDebugLog('⚠️ 数据库未初始化');
                return;
            }
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            store.clear();
            
            fileName.style.display = 'none';
            if (model) {
                scene.remove(model);
                model = null;
                addDebugLog('🗑️ 模型已从场景中移除');
            }
            
            // 重新添加测试立方体
            addTestCube();
            
            loadingEl.textContent = '📁 已清空已保存的模型，请上传新的 .glb 文件';
            loadingEl.style.display = 'block';
            errorEl.style.display = 'none';
            modelStatus.textContent = '未加载';
            modelStatus.style.color = '#666';
            addDebugLog('✅ 已清空 IndexedDB 数据');
        }

        // 初始化 Three.js 场景
        function initScene() {
            addDebugLog('🎬 初始化 Three.js...');
            
            // 清空容器
            container.innerHTML = '';

            // 场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x2a2a2a);
            addDebugLog('📦 场景已创建，背景色: #2a2a2a');

            // 相机 - 更大的视角范围
            const width = container.clientWidth;
            const height = container.clientHeight;
            addDebugLog(`📐 容器大小: ${width}x${height}`);

            camera = new THREE.PerspectiveCamera(
                75,
                width / height,
                0.1,
                10000
            );
            camera.position.set(0, 1.5, 3);
            camera.lookAt(0, 0, 0);
            addDebugLog(`📹 相机初始化: FOV=75, 位置=(0, 1.5, 3)`);

            // 渲染器
            try {
                renderer = new THREE.WebGLRenderer({ 
                    antialias: true, 
                    alpha: true,
                    precision: 'highp',
                    powerPreference: 'high-performance'
                });
                renderer.setSize(width, height);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.shadowMap.enabled = true;
                container.appendChild(renderer.domElement);
                addDebugLog('✅ WebGL 渲染器初始化成功');
            } catch (error) {
                addDebugLog('❌ WebGL 初始化失败: ' + error.message);
                errorEl.style.display = 'block';
                errorEl.textContent = '❌ 您的浏览器不支持 WebGL，请更新浏览器';
                return;
            }

            // 清空默认光源
            scene.children.forEach(child => {
                if (child instanceof THREE.Light) scene.remove(child);
            });

            // 环境光
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
            scene.add(ambientLight);
            addDebugLog('💡 环境光已添加 (强度: 1.2)');

            // 方向光 - 模拟太阳光
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
            directionalLight.position.set(10, 10, 10);
            directionalLight.target.position.set(0, 0, 0);
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            addDebugLog('💡 方向光已添加');

            // 点光源
            const pointLight1 = new THREE.PointLight(0xffffff, 0.6);
            pointLight1.position.set(-8, 8, 8);
            scene.add(pointLight1);
            
            const pointLight2 = new THREE.PointLight(0x6699ff, 0.4);
            pointLight2.position.set(8, 5, -8);
            scene.add(pointLight2);
            addDebugLog('💡 点光源已添加');

            // 网格辅助线
            const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x888888);
            gridHelper.position.y = -3;
            scene.add(gridHelper);
            addDebugLog('📏 网格已添加');

            // 坐标辅助线
            const axesHelper = new THREE.AxesHelper(5);
            scene.add(axesHelper);
            addDebugLog('🧭 坐标轴已添加');

            // 响应窗口大小
            window.addEventListener('resize', onWindowResize);

            // 添加测试立方体验证 WebGL
            addTestCube();

            addDebugLog('✅ 场景初始化完成!');
        }

        // 添加测试立方体
        function addTestCube() {
            const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x00ff00,
                metalness: 0.5,
                roughness: 0.5
            });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(-2, 0, 0);
            cube.name = 'testCube';
            scene.add(cube);
            addDebugLog('✅ 测试立方体已添加 (绿色立方体在左边)');
        }

        // 移除测试立方体
        function removeTestCube() {
            const testCube = scene.getObjectByName('testCube');
            if (testCube) {
                scene.remove(testCube);
                addDebugLog('🗑️ 测试立方体已移除');
            }
        }

        // 从 ArrayBuffer 加载模型
        function loadGLBModelFromBuffer(arrayBuffer, displayName) {
            addDebugLog(`📥 开始加载模型: ${displayName} (${(arrayBuffer.byteLength / 1024 / 1024).toFixed(2)} MB)`);
            
            if (!arrayBuffer || arrayBuffer.byteLength === 0) {
                addDebugLog('❌ 缓冲区为空或无效');
                errorEl.textContent = '❌ 文件数据无效';
                errorEl.style.display = 'block';
                loadingEl.style.display = 'none';
                return;
            }

            const blob = new Blob([arrayBuffer], { type: 'model/gltf-binary' });
            const url = URL.createObjectURL(blob);
            addDebugLog(`📍 Blob URL: ${url.substring(0, 50)}...`);

            const loader = new THREE.GLTFLoader();

            loadingEl.textContent = `加载中... (${(arrayBuffer.byteLength / 1024 / 1024).toFixed(2)} MB)`;
            loadingEl.style.display = 'block';
            errorEl.style.display = 'none';

            let loadTimeout = setTimeout(() => {
                addDebugLog('⏱️ 加载超时（30秒）- 可能是文件太大或网络问题');
                loadingEl.textContent = '加载中... (仍在处理中，请稍候...)';
            }, 30000);

            addDebugLog('🔄 调用 GLTFLoader.load()...');

            loader.load(
                url,
                (gltf) => {
                    clearTimeout(loadTimeout);
                    addDebugLog('✅ GLB 文件解析成功');
                    addDebugLog('🎬 场景对象获取成功');
                    
                    // 移除测试立方体
                    removeTestCube();

                    // 清除旧模型
                    if (model) {
                        scene.remove(model);
                        addDebugLog('🗑️ 已清除旧模型');
                    }

                    model = gltf.scene;
                    addDebugLog(`📊 模型节点数: ${model.children.length}`);
                    addDebugLog(`📍 模型初始位置: (${model.position.x.toFixed(2)}, ${model.position.y.toFixed(2)}, ${model.position.z.toFixed(2)})`);

                    // 调整模型大小和位置
                    try {
                        const box = new THREE.Box3().setFromObject(model);
                        const size = box.getSize(new THREE.Vector3());
                        addDebugLog(`📏 模型原始尺寸: ${size.x.toFixed(2)}x${size.y.toFixed(2)}x${size.z.toFixed(2)}`);
                        
                        const maxDim = Math.max(size.x, size.y, size.z);
                        const scale = 2 / maxDim; // 改为2以获得更好的可视化
                        
                        model.scale.set(scale, scale, scale);
                        addDebugLog(`📏 缩放系数: ${scale.toFixed(4)}`);

                        const center = box.getCenter(new THREE.Vector3());
                        model.position.sub(center);
                        model.position.y += 0.2;

                        addDebugLog(`📍 调整后位置: (${model.position.x.toFixed(2)}, ${model.position.y.toFixed(2)}, ${model.position.z.toFixed(2)})`);
                    } catch (e) {
                        addDebugLog('⚠️ 模型调整异常: ' + e.message);
                    }

                    // 为模型中的所有网格启用阴影
                    model.traverse(function(node) {
                        if (node.isMesh) {
                            node.castShadow = true;
                            node.receiveShadow = true;
                        }
                    });
                    addDebugLog('🎨 模型阴影配置完成');

                    scene.add(model);
                    addDebugLog('✅ 模型已添加到场景');
                    addDebugLog(`📊 场景中现在有 ${scene.children.length} 个对象`);

                    // 调整相机观看模型（使用经过验证的计算方式）
                    const box2 = new THREE.Box3().setFromObject(model);
                    const size2 = box2.getSize(new THREE.Vector3());
                    const maxDim2 = Math.max(size2.x, size2.y, size2.z);
                    const distance = maxDim2 / 2 / Math.tan(Math.PI / 180 * 37.5);
                    
                    camera.position.set(0, maxDim2 * 0.4, distance);
                    camera.lookAt(0, 0, 0);
                    camera.updateProjectionMatrix();
                    addDebugLog(`📹 相机已智能调整: 距离=${distance.toFixed(2)}`);

                    // 重置旋转状态
                    state.rotationAngle = 0;
                    state.totalRotations = 0;
                    state.lastTimestamp = Date.now();

                    // 重新启动动画循环 (确保模型加载后立即旋转)
                    startAnimation();

                    // 更新状态显示
                    loadingEl.style.display = 'none';
                    fileName.textContent = '📄 ' + displayName;
                    fileName.style.display = 'block';
                    modelStatus.textContent = '已加载 ✓';
                    modelStatus.style.color = '#27ae60';
                    rotationStatus.textContent = '启用中 ✓';
                    rotationStatus.style.color = '#27ae60';
                    state.isAutoRotating = true;

                    addDebugLog('✅ 模型加载完成！');
                    addDebugLog(`🔄 自动旋转已启用，RPM: ${state.rpm}`);
                    addDebugLog('═══ 加载成功 ═══');

                    URL.revokeObjectURL(url);
                },
                (progress) => {
                    const percentComplete = Math.round((progress.loaded / progress.total) * 100);
                    loadingEl.textContent = `加载中... ${percentComplete}% (${(progress.loaded / 1024 / 1024).toFixed(2)} MB / ${(progress.total / 1024 / 1024).toFixed(2)} MB)`;
                    if (percentComplete % 25 === 0) {
                        addDebugLog(`⏳ 加载进度: ${percentComplete}%`);
                    }
                },
                (error) => {
                    clearTimeout(loadTimeout);
                    addDebugLog('❌ GLTFLoader 错误: ' + error.message);
                    addDebugLog('📋 错误详情: ' + JSON.stringify(error));
                    
                    loadingEl.style.display = 'none';
                    errorEl.style.display = 'block';
                    errorEl.textContent = '❌ 加载失败: ' + error.message + '<br><small>请检查浏览器控制台或调试信息面板</small>';
                    modelStatus.textContent = '加载失败 ✗';
                    modelStatus.style.color = '#e74c3c';
                    
                    try {
                        URL.revokeObjectURL(url);
                    } catch (e) {}
                }
            );
        }

        // 加载 GLB 文件
        function loadGLBModel(file) {
            addDebugLog(`📤 用户上传文件: ${file.name}`);
            addDebugLog(`📏 文件大小: ${(file.size / 1024 / 1024).toFixed(3)} MB`);
            addDebugLog(`🔍 文件类型: ${file.type}`);

            const reader = new FileReader();

            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                
                addDebugLog(`✅ 文件读取完成: ${(arrayBuffer.byteLength / 1024 / 1024).toFixed(3)} MB`);
                
                // 保存到数据库
                saveModelToDB(file).then(() => {
                    addDebugLog('✅ 模型已保存到 IndexedDB');
                    loadGLBModelFromBuffer(arrayBuffer, file.name);
                }).catch(err => {
                    addDebugLog('❌ 保存到 IndexedDB 失败: ' + err.message);
                    // 即使保存失败也尝试加载
                    loadGLBModelFromBuffer(arrayBuffer, file.name);
                });
            };

            reader.onerror = function(error) {
                addDebugLog('❌ 文件读取错误: ' + (error ? error.message : '未知错误'));
                errorEl.style.display = 'block';
                errorEl.textContent = '❌ 文件读取失败';
                loadingEl.style.display = 'none';
                modelStatus.textContent = '加载失败';
            };

            reader.onprogress = function(event) {
                if (event.lengthComputable) {
                    const percentComplete = Math.round((event.loaded / event.total) * 100);
                    if (percentComplete % 20 === 0) {
                        addDebugLog(`📖 文件读取: ${percentComplete}%`);
                    }
                }
            };

            addDebugLog('📖 开始读取文件...');
            reader.readAsArrayBuffer(file);
        }

        // 文件选择事件
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                loadGLBModel(file);
            }
        });

        // 旋转速度变化
        rotationSpeedSlider.addEventListener('input', (e) => {
            state.rpm = parseInt(e.target.value);
            speedValue.textContent = state.rpm;
            
            // 确保UI立即更新
            currentRPMDisplay.textContent = state.rpm;
            
            if (model) {
                if (state.rpm > 0) {
                    state.isAutoRotating = true;
                    rotationStatus.textContent = '启用中 ✓';
                    rotationStatus.style.color = '#27ae60';
                } else {
                    state.isAutoRotating = false;
                    rotationStatus.textContent = '已暂停';
                    rotationStatus.style.color = '#f39c12';
                }
            }
        });

        // 清空按钮
        clearBtn.addEventListener('click', clearDatabase);

        // 诊断按钮
        document.getElementById('diagnoseBtn').addEventListener('click', runDiagnostics);

        // 动画循环 - 使用 setInterval 确保持续渲染
        let animationInterval = null;
        
        function startAnimation() {
            if (animationInterval) {
                clearInterval(animationInterval);
            }
            
            animationInterval = setInterval(() => {
                if (model && state.isAutoRotating && state.rpm > 0) {
                    const now = Date.now();
                    const deltaTime = (now - state.lastTimestamp) / 1000;
                    state.lastTimestamp = now;

                    const degreesPerSecond = (state.rpm / 60) * 360;
                    state.rotationAngle += degreesPerSecond * deltaTime;
                    state.totalRotations = state.rotationAngle / 360;

                    // 应用旋转（Y轴）
                    model.rotation.y = THREE.MathUtils.degToRad(state.rotationAngle);

                    // 更新UI显示
                    currentRPMDisplay.textContent = state.rpm;
                    totalRotationsDisplay.textContent = state.totalRotations.toFixed(2);
                }

                // 确保场景被正确渲染
                try {
                    renderer.render(scene, camera);
                } catch (e) {
                    addDebugLog('❌ 渲染错误: ' + e.message);
                }
            }, 16); // 大约 60fps
        }

        function stopAnimation() {
            if (animationInterval) {
                clearInterval(animationInterval);
                animationInterval = null;
            }
        }

        // 初始化时启动动画
        function initAnimation() {
            startAnimation();
            addDebugLog('🎬 动画循环已启动 (setInterval 模式)');
        }

        // 窗口调整事件
        function onWindowResize() {
            const width = container.clientWidth;
            const height = container.clientHeight;

            if (!camera || !renderer) return;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();

            renderer.setSize(width, height);
            addDebugLog(`📐 窗口大小已改变: ${width}x${height}`);
        }

        // 启动应用
        async function startup() {
            try {
                addDebugLog('🚀 应用启动中...');
                addDebugLog('⏰ 时间: ' + new Date().toLocaleTimeString());
                
                await initDB();
                addDebugLog('✅ 数据库初始化完成');
                
                addDebugLog('🎬 初始化 Three.js 场景...');
                initScene();
                addDebugLog('✅ Three.js 场景初始化完成');

                // 启动动画循环
                initAnimation();
                addDebugLog('🎬 动画循环已启动');

                // 尝试加载已保存的模型
                addDebugLog('🔍 检查已保存的模型...');
                const savedModel = await loadModelFromDB();
                
                if (savedModel) {
                    addDebugLog(`📦 找到已保存的模型: ${savedModel.name}`);
                    loadingEl.textContent = `正在加载: ${savedModel.name}...`;
                    loadGLBModelFromBuffer(savedModel.data, savedModel.name);
                } else {
                    addDebugLog('⚠️ 未找到已保存的模型 (这是正常的)');
                    loadingEl.textContent = '📁 请上传 .glb 模型文件来开始，或查看绿色测试立方体';
                    addDebugLog('✅ 测试立方体已显示，WebGL 正常工作');
                }
                
                addDebugLog('═══ 启动完成 ═══');
            } catch (error) {
                addDebugLog('❌ 启动失败: ' + error.message);
                addDebugLog('📋 错误堆栈: ' + error.stack);
                errorEl.style.display = 'block';
                errorEl.textContent = '❌ 初始化失败: ' + error.message;
                loadingEl.style.display = 'none';
                try {
                    initScene();
                    initAnimation();
                } catch (e) {
                    addDebugLog('❌ 场景初始化也失败了: ' + e.message);
                }
            }
        }

        // 页面加载完成后启动
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', startup);
        } else {
            startup();
        }
    </script>
</body>
</html>
